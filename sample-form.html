<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Untitled Document</title>
<style>
    @font-face {
        font-family: Candara;
        src: url("Candara.ttf");
    } h1 {
        text-align: center;
        font-weight: normal;
    } form {
        width: 600px;
        min-height: 600px;
        padding: 24px;
        background: gold;
        margin: 36px auto;
        border: 1px solid goldenrod;
        box-shadow: 2px 3px 6px goldenrod;
        border-radius: 18px;
        font: 14pt/1.2em Candara;
    } fieldset {
        margin-top: 18px;
    } #personal input, #submit {
        width: 100%;
        height: 24px;
        margin-bottom: 12px;
    } input[type="text"] {
        width: 98%;
        font: 14pt/1.4em Candara;
        margin-top: 6px;
    } input[type="submit"] {
        width: 100px;
        height: 40px;
        background: lightgreen;
        margin: 6px auto;
        display: block;
        border-radius: 6px;
        border: 1px solid dimgray;
        font: 14pt/1.4em Candara;
    }
</style>
<script language="JavaScript">
    function toggle(source) {
        checkboxes = document.getElementsByName('foo');
        for(var checkbox in checkboxes)
        checkboxes[checkbox].checked = source.checked;
    }
</script>

</head>

<body>
    <form action="https://formsubmit.co/richard.adams@unlv.edu" method="post">
    <h1>Contact Us</h1>
    <input type="text" name="First name" /><br/>
    <label>First name</label><br/>
    <input type="text" name="Last name"><br/>
    <label>Last name</label><br/>
    <fieldset>
    <legend>Reason for contacting us</legend>
    <input type="radio" name="service">
    <label>Design service</label><br/>
    <input type="radio" name="service">
    <label>Design consulting</label><br/>
    <input type="radio" name="service">
    <label>UX/UI Design</label><br/>
    <input type="radio" name="service">
    <label>Other</label>
    </fieldset>
    <fieldset>
    <legend>Operating system</legend>
    <input type="checkbox"  onClick="toggle(this)">
    <label>Check/uncheck all boxes</label><br/>
    <input type="checkbox" name="Mac OS">
    <label>Mac OS</label><br/>
    <input type="checkbox" name="Windows">
    <label>Windows</label><br/>
    <input type="checkbox" name="UNIX">
    <label>UNIX</label><br/>
    <input type="checkbox" name="Other">
    <label>Other</label>
    </fieldset>
    <fieldset>
    <legend name="Time frame">Time frame</legend>
    <select>
        <option name="This week">This week</option>
        <option name="This month">This month</option>
        <option name="This quarter">This quarter</option>
        <option name="Not sure">Not sure</option>
    </select>
    </fieldset>
    <label>Message</label><br/>
    <textarea rows="5" cols="72" name="Message">
    </textarea>
    <input type="submit" />
    </form>
</body>
</html>
