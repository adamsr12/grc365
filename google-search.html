<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Search Form</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<style>
    body {
        font-family: Helvetica, Arial, sans-serif;
        padding: 40px;
    } h1 {
        font: 48pt/1.4em 'Dancing Script';
        text-align: center;
        text-shadow: 1px 2px 3px goldenrod;
    } form {
        width: 400px;
        height: 50px;
        margin: 0 auto;
    } input[type="text"] {
        width: 300px;
        font-size: 14pt;
    }
</style>
</head>
<body>
<h1>Google Search Form</h1>
<form action="https://www.google.com/search" method="get">
  <input type="text" name="q" placeholder="Search Google...">
  <button type="submit">Search</button>
</form>

</body>
</html>
